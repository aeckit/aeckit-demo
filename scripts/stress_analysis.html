<!DOCTYPE html>
<html>
<head>
    <title>Plotly Simulation</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #fff; margin: 0; color: #333; }
        .chart { width: 80%; height: 60%; border: 2px solid #58a6ff; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: #f6f8fa; }
        .dot { width: 12px; height: 12px; background: #58a6ff; border-radius: 50%; margin: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <h1>Structural Stress Analysis (Simulation)</h1>
    <p>This is a mockup of a Plotly/Bokeh interactive chart.</p>
    <div class="chart">
        <div class="dot"></div>
        <div class="dot" style="animation-delay: 0.2s"></div>
        <div class="dot" style="animation-delay: 0.4s"></div>
        <div class="dot" style="animation-delay: 0.6s"></div>
    </div>
</body>
</html>
